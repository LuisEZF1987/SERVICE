name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dimedservice
          POSTGRES_USER: dimed
          POSTGRES_PASSWORD: dimed_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dimed"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "False"
      POSTGRES_DB: dimedservice
      POSTGRES_USER: dimed
      POSTGRES_PASSWORD: dimed_ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      REDIS_CACHE_URL: redis://localhost:6379/1
      MINIO_ROOT_USER: ci-access-key
      MINIO_ROOT_PASSWORD: ci-secret-key
      MINIO_BUCKET_NAME: dimedservice
      MINIO_ENDPOINT: localhost:9000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff (lint)
        working-directory: backend
        run: ruff check .

      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity 2

  frontend:
    name: Frontend (lint + build + tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Unit tests
        run: npm run test
