server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Uploads: embedded HTML manuals (~2.5MB) and phone photos exceed the
    # 1MB nginx default. Django enforces its own 50MB cap.
    client_max_body_size 50M;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin + collected static
    location /static/ {
        alias /usr/share/nginx/static/;
    }

    # Uploaded files (photos, signatures, OT PDFs) — local volume storage
    location /media/ {
        alias /usr/share/nginx/media/;
    }

    # Django admin itself
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing — everything else falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
