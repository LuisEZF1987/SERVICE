[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations"]

[tool.ruff.lint]
# E/F: pycodestyle+pyflakes, I: isort, UP: pyupgrade, B: bugbear, DJ: flake8-django
select = ["E", "F", "I", "UP", "B", "DJ"]
ignore = ["E501"]  # line length is enforced by the formatter

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"config/settings/*.py" = ["F403", "F405", "E402"]
# Seed scripts import models after django.setup(), so E402 is expected.
"load_data.py" = ["E402"]
"**/seed_catalog.py" = ["E402"]

[tool.coverage.run]
source = ["apps"]
omit = ["*/migrations/*", "*/tests.py", "manage.py", "config/*"]
